name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://osaalxaptfshgdlefilx.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYWFseGFwdGZzaGdkbGVmaWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODA1OTYsImV4cCI6MjA5MTA1NjU5Nn0.OOXJptgYoY9Od5Os0GJLFv5uzCcR0aU4gtn0KWgMnkc

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          echo '{"appId":"com.attendance.salarytracker","appName":"متتبع الحضور والراتب","webDir":"dist"}' \
            > android/app/src/main/assets/capacitor.config.json
          echo "" > android/app/src/main/assets/public/cordova.js
          echo 'cordova.define("cordova/plugin_list",function(require,exports,module){module.exports=[];module.exports.metadata={};});' \
            > android/app/src/main/assets/public/cordova_plugins.js
          echo "✅ Assets: $(ls android/app/src/main/assets/public/ | wc -l) files"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Validate Keystore
        run: |
          KEYSTORE="android/app/keystore/release.keystore"
          if [ -f "$KEYSTORE" ]; then
            echo "✅ Keystore found"
            keytool -list -keystore "$KEYSTORE" -storepass Basel1611Basel -noprompt 2>&1 | head -5 || echo "Keystore validation warning"
          else
            echo "⚠️ Keystore not found, will use debug signing"
          fi

      - name: Build Release APK
        id: gradle_build
        run: |
          cd android
          
          KEYSTORE_FILE="$(pwd)/app/keystore/release.keystore"
          
          if [ -f "$KEYSTORE_FILE" ]; then
            echo "Building with release keystore..."
            ./gradlew assembleRelease \
              --no-daemon \
              --stacktrace \
              -x lintVitalRelease \
              -x lint \
              -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
              -Pandroid.injected.signing.store.password=Basel1611Basel \
              -Pandroid.injected.signing.key.alias=attendance_pro \
              -Pandroid.injected.signing.key.password=Basel1611Basel \
              2>&1 | tee /tmp/gradle_build.log
          else
            echo "Building debug APK (no keystore)..."
            ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace \
              -x lint \
              2>&1 | tee /tmp/gradle_build.log
          fi
          
          echo "=== BUILD RESULT ==="
          echo "Exit code: $?"
          find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found yet"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log
          retention-days: 7

      - name: Find and prepare APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-apk
          
          # البحث عن APK (release أو debug)
          APK_FILE=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found!"
            ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            exit 1
          fi
          
          echo "✅ Found APK: $APK_FILE"
          cp "$APK_FILE" "release-apk/AttendancePro-v${VERSION}.apk"
          echo "APK_VERSION=v${VERSION}" >> $GITHUB_ENV
          echo "✅ Final: $(ls release-apk/)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AttendancePro-APK
          path: release-apk/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APK_VERSION }}-build.${{ github.run_number }}
          name: "متتبع الحضور والراتب ${{ env.APK_VERSION }} (Build ${{ github.run_number }})"
          body: |
            ## تحديث تلقائي 🚀

            ### ما الجديد:
            ${{ github.event.head_commit.message }}

            ### طريقة التثبيت:
            1. حمّل ملف `AttendancePro-*.apk`
            2. افتح الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبّت التطبيق
            4. سجّل دخولك بنفس بيانات الموقع

            ### بيانات الدخول:
            - **المدير:** `admin` / `admin123`
            - **باسل أشرف:** `basel2026` / `basel123`
            - **محمد جبريل:** `gebrel` / `gebrel123`

            ---
            🔗 الموقع: https://attendance-salary-tracker-2kgv285go.vercel.app
          files: release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
