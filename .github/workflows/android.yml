name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://osaalxaptfshgdlefilx.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYWFseGFwdGZzaGdkbGVmaWx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0ODA1OTYsImV4cCI6MjA5MTA1NjU5Nn0.OOXJptgYoY9Od5Os0GJLFv5uzCcR0aU4gtn0KWgMnkc

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/
          # إنشاء capacitor.config.json
          node -e "
            const cfg = require('./capacitor.config.ts').default || {};
            const json = {
              appId: 'com.attendance.salarytracker',
              appName: 'متتبع الحضور والراتب',
              webDir: 'dist'
            };
            require('fs').writeFileSync('android/app/src/main/assets/capacitor.config.json', JSON.stringify(json, null, 2));
          " 2>/dev/null || echo '{"appId":"com.attendance.salarytracker","appName":"متتبع الحضور والراتب","webDir":"dist"}' > android/app/src/main/assets/capacitor.config.json
          echo "✅ Assets copied: $(ls android/app/src/main/assets/public/ | wc -l) files"
          # إنشاء cordova placeholders
          echo "" > android/app/src/main/assets/public/cordova.js
          echo "cordova.define('cordova/plugin_list', function(require, exports, module) { module.exports = []; module.exports.metadata = {}; });" > android/app/src/main/assets/public/cordova_plugins.js

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Verify Android project structure
        run: |
          echo "=== Project Structure ==="
          ls android/
          echo "=== App dir ==="
          ls android/app/
          echo "=== Gradle version ==="
          cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl
          echo "=== node_modules/@capacitor/android ==="
          ls node_modules/@capacitor/android/capacitor/ | head -5
          echo "=== Keystore ==="
          ls -la android/app/keystore/

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -x lintVitalRelease \
            -x lint \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.keystore \
            -Pandroid.injected.signing.store.password=Basel1611Basel \
            -Pandroid.injected.signing.key.alias=attendance_pro \
            -Pandroid.injected.signing.key.password=Basel1611Basel
          echo "=== APK Output ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Prepare APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release-apk
          APK_FILE=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          cp "$APK_FILE" "release-apk/AttendancePro-v${VERSION}.apk"
          echo "APK_VERSION=v${VERSION}" >> $GITHUB_ENV
          echo "✅ APK ready: release-apk/AttendancePro-v${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AttendancePro-APK
          path: release-apk/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APK_VERSION }}-build.${{ github.run_number }}
          name: "متتبع الحضور والراتب ${{ env.APK_VERSION }} (Build ${{ github.run_number }})"
          body: |
            ## تحديث تلقائي 🚀

            ### ما الجديد:
            ${{ github.event.head_commit.message }}

            ### طريقة التثبيت:
            1. حمّل ملف `AttendancePro-*.apk`
            2. افتح الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبّت التطبيق
            4. سجّل دخولك بنفس بيانات الموقع

            ### بيانات الدخول:
            - **المدير:** `admin` / `admin123`
            - **باسل أشرف:** `basel2026` / `basel123`
            - **محمد جبريل:** `gebrel` / `gebrel123`

            ---
            🔗 الموقع: https://attendance-salary-tracker-2kgv285go.vercel.app
          files: release-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
