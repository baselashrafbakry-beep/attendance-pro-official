name: Build Android APK (Release) on: workflow_dispatch: push: branches: - main jobs: build: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - name: Set up Node.js uses: actions/setup-node@v4 with: node-version: 22 - name: Install dependencies run: npm install - name: Build Web App run: npm run build - name: Set up Java uses: actions/setup-java@v4 with: distribution: 'zulu' java-version: '21' - name: Build Android Release APK run: | npx cap add android npx cap sync android cd android && ./gradlew assembleRelease - name: Find Release APK run: find android/app/build/outputs/apk/release -name '*.apk' - name: Upload Release APK uses: actions/upload-artifact@v4 with: name: Attendance-Pro-Release path: android/app/build/outputs/apk/release/*.apk
