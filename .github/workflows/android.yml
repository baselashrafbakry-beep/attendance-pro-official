name: Build Android APK (Release)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Web App
        run: npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Sync Capacitor assets
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK (no signing required)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist-apk/attendance-pro-v$(node -p "require('./package.json').version")-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: attendance-pro-apk
          path: dist-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "متتبع الحضور والراتب - v${{ github.run_number }}"
          body: |
            ## تحديث تلقائي 🚀
            
            تم البناء تلقائياً من آخر تعديلات.
            
            ### كيفية التثبيت:
            1. حمّل ملف `attendance-pro-*.apk`
            2. افتح الملف على هاتفك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك ذلك
            4. ثبّت التطبيق واستمتع 🎉
          files: dist-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
